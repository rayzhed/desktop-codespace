# Prefix: Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alt+Arrow to move panes (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse + scrollback
set -g mouse on
set -g history-limit 50000

# Visual
set -g default-terminal "screen-256color"
set -g status-style 'bg=#1a1a2e fg=#00ff41'
set -g pane-active-border-style 'fg=#00ff41'
set -g base-index 1

# Quick pentest layout: Ctrl+A P
bind P split-window -h -p 50 \; split-window -v -p 30 \; select-pane -t 0
